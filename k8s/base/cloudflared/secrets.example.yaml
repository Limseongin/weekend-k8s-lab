# Template — copy to secrets.yaml (gitignored), fill in, then `kubectl apply -k`.
#   credentials.json: file written by `cloudflared tunnel create` at
#                     ~/.cloudflared/<UUID>.json. cloudflared derives the
#                     tunnel UUID from this JSON, so no separate TUNNEL_ID
#                     field is needed.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-credentials
  namespace: weekend-k8s-lab
  labels:
    app: cloudflared
type: Opaque
stringData:
  credentials.json: |
    {
      "AccountTag": "REPLACE_ME",
      "TunnelSecret": "REPLACE_ME",
      "TunnelID": "REPLACE_ME"
    }
