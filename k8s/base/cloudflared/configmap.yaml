apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: weekend-k8s-lab
  labels:
    app: cloudflared
data:
  config.yaml: |
    # Tunnel UUID is supplied at startup via $TUNNEL_ID (see deployment.yaml).
    # Credentials JSON is mounted from the cloudflared-credentials Secret.
    credentials-file: /etc/cloudflared/creds/credentials.json
    no-autoupdate: true
    metrics: 0.0.0.0:2000

    ingress:
      # #4: /api/* → FastAPI backend. Must precede the catch-all since
      # cloudflared matches rules top-down.
      - hostname: k8sproject.limseongin.com
        path: ^/api/
        service: http://backend.weekend-k8s-lab.svc.cluster.local:80

      # #6: everything else → React SPA on nginx. Frontend's nginx.conf
      # falls back to /index.html for client-side routes, so deep links
      # (/products/:id) and page refreshes work. #2's original nginx
      # placeholder is no longer needed — frontend serves / directly.
      - hostname: k8sproject.limseongin.com
        service: http://frontend.weekend-k8s-lab.svc.cluster.local:80

      # Cloudflared requires a catch-all default.
      - service: http_status:404
