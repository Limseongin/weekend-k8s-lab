apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: weekend-k8s-lab
  labels:
    app: cloudflared
data:
  config.yaml: |
    # Tunnel UUID is supplied at startup via $TUNNEL_ID (see deployment.yaml).
    # Credentials JSON is mounted from the cloudflared-credentials Secret.
    credentials-file: /etc/cloudflared/creds/credentials.json
    no-autoupdate: true
    metrics: 0.0.0.0:2000

    ingress:
      # #4: /api/* → FastAPI backend.
      - hostname: k8sproject.limseongin.com
        path: ^/api/
        service: http://backend.weekend-k8s-lab.svc.cluster.local:80

      # #2: default host route → nginx placeholder. Until #2 lands and
      # creates the nginx-placeholder Service, this route will 502 — /api/*
      # is unaffected because it matches the earlier rule.
      - hostname: k8sproject.limseongin.com
        service: http://nginx-placeholder.weekend-k8s-lab.svc.cluster.local:80

      # Cloudflared requires a catch-all default.
      - service: http_status:404
