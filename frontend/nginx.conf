server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed asset bundles — long cache.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any unknown path returns /index.html so client-side
  # routes (e.g. /products/:id) work on deep links and refreshes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
