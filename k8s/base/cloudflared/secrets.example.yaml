# Template — copy to secrets.yaml (gitignored), fill in, then `kubectl apply -k`.
#   TUNNEL_ID:        tunnel UUID from `cloudflared tunnel create` (also
#                     the filename of ~/.cloudflared/<UUID>.json). Used as
#                     the positional arg to `cloudflared tunnel run` via
#                     $(TUNNEL_ID) substitution in the Deployment args.
#   credentials.json: contents of ~/.cloudflared/<UUID>.json. Holds the
#                     TunnelSecret needed to prove ownership.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-credentials
  namespace: weekend-k8s-lab
  labels:
    app: cloudflared
type: Opaque
stringData:
  TUNNEL_ID: REPLACE_WITH_TUNNEL_UUID
  credentials.json: |
    {
      "AccountTag": "REPLACE_ME",
      "TunnelSecret": "REPLACE_ME",
      "TunnelID": "REPLACE_ME"
    }
