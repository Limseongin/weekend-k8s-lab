# Template — copy to secrets.yaml (gitignored), fill in, then `kubectl apply -k`.
#   TUNNEL_ID:        tunnel UUID from `cloudflared tunnel create` or the dashboard
#   credentials.json: file downloaded when the tunnel was created
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-credentials
  namespace: weekend-k8s-lab
  labels:
    app: cloudflared
type: Opaque
stringData:
  TUNNEL_ID: REPLACE_WITH_TUNNEL_UUID
  credentials.json: |
    {
      "AccountTag": "REPLACE_ME",
      "TunnelSecret": "REPLACE_ME",
      "TunnelID": "REPLACE_ME"
    }
