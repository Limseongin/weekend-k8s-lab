apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-seed
  namespace: weekend-k8s-lab
  labels:
    app: mongo
    component: seed
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: mongo
        component: seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          # Reuses the backend image so the seed has both psycopg (to read
          # product ids from postgres) and pymongo (to populate mongo).
          image: 192.168.56.105:30500/backend:v2
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.seed_mongo"]
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: MONGO_HOST
              value: mongo
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: MONGO_INITDB_DATABASE
          envFrom:
            - secretRef:
                name: postgres-credentials
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
