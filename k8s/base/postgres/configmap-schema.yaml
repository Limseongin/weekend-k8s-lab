apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-schema
  namespace: weekend-k8s-lab
  labels:
    app: postgres
data:
  schema.sql: |
    -- Idempotent: safe to re-run. Schema covers #3 (products) plus the
    -- tables #4/#7 will need (carts, cart_items, event_log) so later
    -- issues do not require a migration.
    BEGIN;

    CREATE EXTENSION IF NOT EXISTS pgcrypto;

    CREATE TABLE IF NOT EXISTS products (
      id          UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
      name        TEXT        NOT NULL,
      price_cents INTEGER     NOT NULL CHECK (price_cents >= 0),
      category    TEXT        NOT NULL DEFAULT 'camera',
      created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS carts (
      id         UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS cart_items (
      id         UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
      cart_id    UUID        NOT NULL REFERENCES carts(id) ON DELETE CASCADE,
      product_id UUID        NOT NULL REFERENCES products(id),
      quantity   INTEGER     NOT NULL DEFAULT 1 CHECK (quantity > 0),
      created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      UNIQUE (cart_id, product_id)
    );

    CREATE TABLE IF NOT EXISTS event_log (
      id         BIGSERIAL   PRIMARY KEY,
      event_type TEXT        NOT NULL,
      payload    JSONB       NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    COMMIT;
  seed.sql: |
    -- Seeds exactly 50 dummy camera Products on first run; no-op afterwards.
    -- Deterministic names and prices so re-running the Job produces the same
    -- catalog (idempotency is enforced by the WHERE NOT EXISTS guard, not
    -- by the determinism, but determinism makes diffs reviewable).
    INSERT INTO products (name, price_cents, category)
    SELECT
      'Camera Model ' || lpad(i::text, 3, '0'),
      50000 + (i * 1500),
      'camera'
    FROM generate_series(1, 50) AS s(i)
    WHERE NOT EXISTS (SELECT 1 FROM products);
