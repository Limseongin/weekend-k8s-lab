apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: weekend-k8s-lab
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.5.0
          # The cloudflared image is distroless (no shell), so we invoke
          # the binary directly. Tunnel UUID is derived from the mounted
          # credentials.json via --credentials-file, so no env var is
          # needed and `run` takes no positional argument.
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - --credentials-file
            - /etc/cloudflared/creds/credentials.json
            - run
          ports:
            - name: metrics
              containerPort: 2000
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: creds
          secret:
            secretName: cloudflared-credentials
            items:
              - key: credentials.json
                path: credentials.json
